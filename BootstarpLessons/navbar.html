<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <!-- xs sm md lg xl xxl -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="" class="navbar-brand">Phyu Sin</a>
            <button class="navbar-toggler" data-bs-toggler="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">Home</a></li>
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">Services</a></li>
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">Blog</a></li>
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">Products</a></li>
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">About</a></li>
                    <li class="nav-item"><a href="" class="nav-link ms-lg-4">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="carousel slide" data-bs-ride="carousel" id="myCarousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="image/banner.jpg" alt="" class="d-block w-100">
            </div>
            <div class="carousel-inner">
            <div class="carousel-item">
                <img src="image/logo.jpg" alt="" class="d-block w-100">
            </div>
            <button class="carousel-control-prev" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
        </div>
    </div>
</body>
</html>
