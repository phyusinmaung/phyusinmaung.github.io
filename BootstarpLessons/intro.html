<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1 class="text-center text-warning my-5">Hello Bootstrap!</h1>

    <button class="btn btn-success mx-3 btn-tg">Button</button>
    <button class="btn btn-danger mx-3 btn-tg">Button</button>
    <button class="btn btn-warning mx-3 btn-tg">Button</button>
    <button class="btn btn-info mx-3 btn-tg">Button</button>
    <button class="btn btn-secondary mx-3 btn-tg">Button</button>
    <button class="btn btn-primary mx-3 btn-tg">Button</button>
    <button class="btn btn-light mx-3 btn-tg">Button</button>
    <button class="btn btn-dark mx-3 btn-tg">Button</button>

    <h1 class="text-center text-danger my-5">Outline Button</h1>
    <button class="btn btn-outline-success mx-3">Outline Button</button>
    <button class="btn btn-outline-danger mx-3">Outline Button</button>
    <button class="btn btn-outline-warning mx-3">Outline Button</button>
    <button class="btn btn-outline-info mx-3">Outline Button</button>
    <button class="btn btn-outline-secondary mx-3">Outline Button</button>
    <button class="btn btn-outline-primary mx-3">Outline Button</button>
    <button class="btn btn-outline-light mx-3">Outline Button</button>
    <button class="btn btn-outline-dark mx-3">Outline Button</button>

    <br><br>

    <a href="" class="btn btn-primary">A tag to Button</a>

    <button class="btn btn-link">Link Button</button>
</body>
</html>
