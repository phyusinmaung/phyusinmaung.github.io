<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1 class="text-center text-danger my-5">Form Lessons</h1>

    <div class="container">
        <div class="row">
            <div class="col-12 offset-md-4 col-md-4">
                <form action="">
                    <div class="mb-3">
                        <label for="photo" class="form-label">Photo</label>
                        <input type="file" name="photo" id="photo" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" name="name" id="name" placeholder="Enter Name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" placeholder="Enter Email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" id="password" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" name="phone" id="phone" placeholder="Enter Phone Number" class="form-control">
                    </div>
                
                    <label for="" class="d-block">Gender</label>
                    <div class="form-check-inline">
                        <input type="radio" id="male" name="gender" class="form-check-input">
                        <label for="male" class="form-check-label">Male</label>
                    </div>
                    <div class="form-check-inline">
                        <input type="radio" id="female" name="gender" class="form-check-input">
                        <label for="female" class="form-check-label">Female</label>
                    </div>

                    <div class="my-3">
                        <label for="education" class="form-label">Education</label>
                        <select name="education" id="education" class="form-select form-select">
                            <option value="0">Choose One Education</option>
                            <option value="1">First Year</option>
                            <option value="2">Second Year</option>
                            <option value="3">Third Year</option>
                            <option value="4">Fourth Year</option>
                            <option value="5">Final Year</option>
                        </select>
                    </div>

                    <label for="" class="d-block mb-2">Hobbies</label>
                    <div class="form-check">
                        <input type="checkbox" id="reading" class="form-check-input">
                        <label for="reding" class="form-check-label">Reading</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="rwriting" class="form-check-input">
                        <label for="writing" class="form-check-label">Writing</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="rcoding" class="form-check-input">
                        <label for="coding" class="form-check-label">Coding</label>
                    </div>

                    <div class="my-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea name="address" id="address" class="form-control"></textarea>
                    </div>

                    <button class="btn btn-success float-end">Register</button>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
