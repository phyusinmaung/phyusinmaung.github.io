<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1 style="text-align: center;">Digital Clock</h1>

    <div class="clock">
        <div class="day">
            <span id="day"></span> <span class="date" id="date"></span>
        </div>
        <div class="time">
            <span id="time"></span> <span class="seconds" id="seconds"></span> <span class="am_pm" id="am_pm"></span>
        </div>
    </div>

    <script>
        function timeInterval(){
        let now = new Date();

        let days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        let day = now.getDay();
        // console.log(days[day]);

        let date = now.getDate();

        let months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        let month = now.getMonth();
        // console.log(months[month]);

        let year = now.getFullYear();

        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        
        // AM / PM
        let am_pm = 'AM';
        if (hours >= 12) {
            am_pm = 'PM';
        }

        if (hours < 10) {
            hours = "0" + hours;
        }
        if (minutes < 10) {
            minutes = "0" + minutes;
        }
        if (seconds < 10) {
            seconds = "0" + seconds;
        }

        document.getElementById('day').innerText = days[day];
        document.getElementById('date').innerText = date + " " + months[month] + "," + " " + year;
        document.getElementById("time").innerText = hours + ":" + minutes + ":";
        document.getElementById('seconds').innerText = seconds;
        document.getElementById("am_pm").innerText = am_pm;
    }

    setInterval(timeInterval, 1000);
    
    </script>

</body>
</html>
